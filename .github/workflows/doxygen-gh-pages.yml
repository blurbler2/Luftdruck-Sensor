name: Deploy Doxygen to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python (for Doxygen)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Clean Doxygen output
        run: rm -rf html/ docs/html/

      - name: Generate Doxygen documentation
        run: doxygen Doxyfile

      - name: Check if Doxygen HTML exists
        id: check_html
        run: |
          if [ -f html/index.html ] || [ -f docs/html/index.html ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html
          publish_branch: gh-pages
          force_orphan: true
        if: steps.check_html.outputs.exists == 'true'